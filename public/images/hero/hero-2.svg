<svg width="1200" height="600" viewBox="0 0 1200 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#gradient2)"/>
  
  <!-- Large Slide Number -->
  <circle cx="150" cy="100" r="60" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="3"/>
  <text x="150" y="120" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="48" font-weight="bold">2</text>
  
  <!-- Decorative Elements -->
  <polygon points="100,500 300,100 500,500" fill="rgba(255,255,255,0.1)"/>
  <polygon points="700,500 900,200 1100,500" fill="rgba(255,255,255,0.1)"/>
  <rect x="400" y="450" width="400" height="100" rx="50" fill="rgba(255,255,255,0.05)"/>
  
  <!-- Slide Indicator Text -->
  <text x="600" y="320" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="32" font-weight="bold">SLIDE 2 - PINK</text>
  <text x="600" y="360" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif" font-size="18">Innovation & Quality Focus</text>
</svg>
<svg width="1200" height="600" viewBox="0 0 1200 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#gradient3)"/>
  
  <!-- Large Slide Number -->
  <circle cx="150" cy="100" r="60" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="3"/>
  <text x="150" y="120" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="48" font-weight="bold">3</text>
  
  <!-- Decorative Elements -->
  <rect x="900" y="100" width="200" height="200" rx="100" fill="rgba(255,255,255,0.1)"/>
  <rect x="100" y="400" width="200" height="150" rx="75" fill="rgba(255,255,255,0.1)"/>
  <polygon points="800,450 900,350 1000,450 950,500 850,500" fill="rgba(255,255,255,0.05)"/>
  
  <!-- Slide Indicator Text -->
  <text x="600" y="320" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="32" font-weight="bold">SLIDE 3 - BLUE</text>
  <text x="600" y="360" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif" font-size="18">Award-Winning Excellence</text>
</svg>